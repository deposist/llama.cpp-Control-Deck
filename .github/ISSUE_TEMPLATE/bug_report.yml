name: Bug report
description: Report something that is broken or confusing
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please remove API keys, private prompts,
        production hostnames, and sensitive paths from logs before posting.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: The GUI starts, but Start selected fails with...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Give exact steps so maintainers can reproduce the behavior.
      placeholder: |
        1. Open Server tab
        2. Click Auto-detect runtime
        3. Select model
        4. Click Start
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: The server starts and /v1/models returns a response.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python, llama.cpp build, GPU, desktop environment.
      value: |
        OS:
        Python:
        llama.cpp commit/build:
        GPU:
        Desktop environment:
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Paste relevant output.
      value: |
        python3 config.py --detect-runtime

        python3 llama_server_manager.py status

        Relevant log lines:
      render: text
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I removed API keys and sensitive data from logs.
          required: true
        - label: I searched existing issues.
          required: true
